name: CD (Azure VM via ACR)

on:
  repository_dispatch:
    types: [ci-passed]
  workflow_dispatch: # Cho phép chạy thủ công nếu cần

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Login vào Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Login vào Azure Container Registry (ACR)
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHA_TAG=${GITHUB_SHA::12}
          echo "sha=$SHA_TAG" >> $GITHUB_OUTPUT

      # 3. Build & Push Docker images (Backend & Frontend)
      - name: Build & Push Images
        run: |
          REGISTRY=${{ secrets.ACR_NAME }}.azurecr.io
          
          # Build Backend
          docker build -t $REGISTRY/quiz-backend:latest -t $REGISTRY/quiz-backend:${{ steps.meta.outputs.sha }} ./server
          docker push $REGISTRY/quiz-backend:latest
          docker push $REGISTRY/quiz-backend:${{ steps.meta.outputs.sha }}
          
          # Build Frontend
          docker build -t $REGISTRY/quiz-frontend:latest -t $REGISTRY/quiz-frontend:${{ steps.meta.outputs.sha }} ./web
          docker push $REGISTRY/quiz-frontend:latest
          docker push $REGISTRY/quiz-frontend:${{ steps.meta.outputs.sha }}

      # 4. Deploy lên Azure VM qua SSH
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -e
            mkdir -p ${{ secrets.PROJECT_PATH }}/docker
            cd ${{ secrets.PROJECT_PATH }}

            # Login ACR trên VM
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_NAME }}.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin

            # Ghi đè nguyên file ENV từ GitHub Secret (Cách bạn muốn)
            cat > server/.env << 'EOF'
            ${{ secrets.SERVER_ENV_FILE }}
            EOF

            cat > web/.env << 'EOF'
            ${{ secrets.WEB_ENV_FILE }}
            EOF

            # Export các biến cần thiết cho Docker Compose
            export ACR_REGISTRY=${{ secrets.ACR_NAME }}.azurecr.io
            export IMAGE_TAG=latest

            # Pull và Restart
            docker compose -f docker/docker-compose.prod.yml pull
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans

            # Dọn dẹp để tiết kiệm dung lượng VM
            docker image prune -af
