name: CD (EC2)

on:
  # Chỉ chạy khi CI pass
  repository_dispatch:
    types: [ci-passed]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHA_TAG=${GITHUB_SHA::12}
          echo "sha=$SHA_TAG" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          docker build -t $IMAGE_URI:latest -t $IMAGE_URI:${{ steps.meta.outputs.sha }} .

      - name: Push image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ steps.meta.outputs.sha }}

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'docker-compose.prod.yml'
          target: '${{ secrets.EC2_PATH }}'

      - name: Create base .env file on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_PATH }}
            cat > .env << 'EOF'
            # Docker Compose sẽ tự động tạo DB và Redis containers
            # Các giá trị này dành cho Docker internal networking

            # Database - sẽ được container 'db' cung cấp
            DATABASE_URL=postgresql://postgres:postgres@db:5432/mydb

            # Redis - sẽ được container 'redis-cache' cung cấp  
            REDIS_HOST=redis-cache
            REDIS_PORT=6379
            REDIS_PASSWORD=
            REDIS_URL=redis://redis-cache:6379

            # PostgreSQL defaults
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres
            POSTGRES_DB=mydb

            # App defaults
            NODE_ENV=production
            PORT=5000

            EOF
            chmod 600 .env

      - name: Update .env file with secrets on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          IMMICH_LOG_LEVEL: ${{ secrets.IMMICH_LOG_LEVEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_IGNORE_CERT: ${{ secrets.SMTP_IGNORE_CERT }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          REFRESH_TOKEN_EXPIRES_IN: ${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          REDIS_TLS: ${{ secrets.REDIS_TLS }}
          REDIS_KEY_PREFIX: ${{ secrets.REDIS_KEY_PREFIX }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          APP_CONTAINER_NAME: ${{ secrets.APP_CONTAINER_NAME }}
          DB_CONTAINER_NAME: ${{ secrets.DB_CONTAINER_NAME }}
          REDIS_CONTAINER_NAME: ${{ secrets.REDIS_CONTAINER_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          REDIS_EXTERNAL_PORT: ${{ secrets.REDIS_EXTERNAL_PORT }}
          POSTGRES_VERSION: ${{ secrets.POSTGRES_VERSION }}
          REDIS_VERSION: ${{ secrets.REDIS_VERSION }}
          REDIS_MAX_MEMORY: ${{ secrets.REDIS_MAX_MEMORY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_PATH }}
            umask 177
            # Update existing .env file with secrets
            add_line() { KEY="$1"; VAL="$2"; if [ -n "$VAL" ]; then grep -v "^$KEY=" .env > .env.tmp || true; mv .env.tmp .env; printf "%s=%s\n" "$KEY" "$VAL" >> .env; fi }
            add_line GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID"
            add_line GOOGLE_REDIRECT_URI "$GOOGLE_REDIRECT_URI"
            add_line GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET"
            add_line IMMICH_LOG_LEVEL "$IMMICH_LOG_LEVEL"
            add_line SMTP_HOST "$SMTP_HOST"
            add_line SMTP_PORT "$SMTP_PORT"
            add_line SMTP_USERNAME "$SMTP_USERNAME"
            add_line SMTP_PASSWORD "$SMTP_PASSWORD"
            add_line SMTP_IGNORE_CERT "$SMTP_IGNORE_CERT"
            add_line EMAIL_FROM_NAME "$EMAIL_FROM_NAME"
            add_line EMAIL_FROM_ADDRESS "$EMAIL_FROM_ADDRESS"
            add_line EMAIL_REPLY_TO "$EMAIL_REPLY_TO"
            add_line JWT_SECRET "$JWT_SECRET"
            add_line JWT_EXPIRES_IN "$JWT_EXPIRES_IN"
            add_line JWT_REFRESH_SECRET "$JWT_REFRESH_SECRET"
            add_line REFRESH_TOKEN_SECRET "$REFRESH_TOKEN_SECRET"
            add_line REFRESH_TOKEN_EXPIRES_IN "$REFRESH_TOKEN_EXPIRES_IN"
            add_line CLOUDINARY_CLOUD_NAME "$CLOUDINARY_CLOUD_NAME"
            add_line CLOUDINARY_API_KEY "$CLOUDINARY_API_KEY"
            add_line CLOUDINARY_API_SECRET "$CLOUDINARY_API_SECRET"
            add_line FRONTEND_URL "$FRONTEND_URL"
            add_line REDIS_TLS "$REDIS_TLS"
            add_line REDIS_KEY_PREFIX "$REDIS_KEY_PREFIX"
            add_line POSTGRES_USER "$POSTGRES_USER"
            add_line POSTGRES_PASSWORD "$POSTGRES_PASSWORD"
            add_line POSTGRES_DB "$POSTGRES_DB"
            add_line REDIS_PASSWORD "$REDIS_PASSWORD"
            add_line APP_CONTAINER_NAME "$APP_CONTAINER_NAME"
            add_line DB_CONTAINER_NAME "$DB_CONTAINER_NAME"
            add_line REDIS_CONTAINER_NAME "$REDIS_CONTAINER_NAME"
            add_line DB_PORT "$DB_PORT"
            add_line REDIS_EXTERNAL_PORT "$REDIS_EXTERNAL_PORT"
            add_line POSTGRES_VERSION "$POSTGRES_VERSION"
            add_line REDIS_VERSION "$REDIS_VERSION"
            add_line REDIS_MAX_MEMORY "$REDIS_MAX_MEMORY"
            chmod 600 .env

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG
          script: |
            set -e
            cd ${{ secrets.EC2_PATH }}
            # Set secure file permissions
            umask 177

            # Auto cleanup old containers and images
            echo "🧹 Cleaning up old containers and images..."
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker system prune -f || true

            # Login to ECR
            echo "🔐 Logging into ECR..."
            aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
            export ECR_REGISTRY=${ECR_REGISTRY}
            export ECR_REPOSITORY=${ECR_REPOSITORY}
            export IMAGE_TAG=${IMAGE_TAG}

            # Pull latest image
            echo "📥 Pulling latest image..."
            docker compose -f docker-compose.prod.yml pull

            # Start services with fresh environment
            echo "🚀 Starting services with fresh environment..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate

            # Verify deployment
            echo "✅ Verifying deployment..."
            sleep 10
            docker compose -f docker-compose.prod.yml ps
