name: CD (EC2)

on:
  repository_dispatch:
    types: [ci-passed]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHA_TAG=${GITHUB_SHA::12}
          echo "sha=$SHA_TAG" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          docker build -t $IMAGE_URI:latest -t $IMAGE_URI:${{ steps.meta.outputs.sha }} .

      - name: Push image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ steps.meta.outputs.sha }}

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'docker-compose.prod.yml'
          target: '${{ secrets.EC2_PATH }}'

      - name: Create .env file on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_PATH }}
            if [ ! -f .env ]; then
              cat > .env << 'EOF'
            # Docker Compose sẽ tự động tạo DB và Redis containers
            # Các giá trị này dành cho Docker internal networking

            # Database - sẽ được container 'db' cung cấp
            DATABASE_URL=postgresql://postgres:postgres@db:5432/mydb

            # Redis - sẽ được container 'redis-cache' cung cấp  
            REDIS_HOST=redis-cache
            REDIS_PORT=6379
            REDIS_PASSWORD=
            REDIS_URL=redis://redis-cache:6379

            # PostgreSQL defaults
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres
            POSTGRES_DB=mydb

            # App defaults
            NODE_ENV=production
            PORT=5000

            EOF
              chmod 600 .env
            fi

      - name: Create/Update .env.override on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          IMMICH_LOG_LEVEL: ${{ secrets.IMMICH_LOG_LEVEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_IGNORE_CERT: ${{ secrets.SMTP_IGNORE_CERT }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_PATH }}

            # Tạo file .env.override trực tiếp (không dùng heredoc)
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" > .env.override
            echo "GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI" >> .env.override
            echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env.override
            echo "IMMICH_LOG_LEVEL=$IMMICH_LOG_LEVEL" >> .env.override
            echo "SMTP_HOST=$SMTP_HOST" >> .env.override
            echo "SMTP_PORT=$SMTP_PORT" >> .env.override
            echo "SMTP_USERNAME=$SMTP_USERNAME" >> .env.override
            echo "SMTP_PASSWORD=$SMTP_PASSWORD" >> .env.override
            echo "SMTP_IGNORE_CERT=$SMTP_IGNORE_CERT" >> .env.override
            echo "EMAIL_FROM_NAME=$EMAIL_FROM_NAME" >> .env.override
            echo "EMAIL_FROM_ADDRESS=$EMAIL_FROM_ADDRESS" >> .env.override
            echo "EMAIL_REPLY_TO=$EMAIL_REPLY_TO" >> .env.override
            echo "JWT_SECRET=$JWT_SECRET" >> .env.override
            echo "JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET" >> .env.override

            chmod 600 .env.override

            echo "✅ .env.override created with $(wc -l < .env.override) lines"
            echo "First 3 lines (for verification):"
            head -n 3 .env.override | sed 's/=.*/=***/'

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG
          script: |
            set -e
            cd ${{ secrets.EC2_PATH }}
            whoami
            echo $PATH
            ls -l $(which docker)
            docker --version
            docker compose version
            aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
            export ECR_REGISTRY=${ECR_REGISTRY}
            export ECR_REPOSITORY=${ECR_REPOSITORY}
            export IMAGE_TAG=${IMAGE_TAG}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
