name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  build-server:
    name: Build Server (NestJS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Clean install directory
        run: |
          rm -rf node_modules
          npm cache clean --force

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit || \
          (npm cache clean --force && npm ci --no-audit) || \
          (sleep 5 && npm ci --no-audit)
        timeout-minutes: 10

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Validate Dockerfile
        run: docker build -t quiz-server-ci:latest -f Dockerfile .

  build-web:
    name: Build Web (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Clean install directory
        run: |
          rm -rf node_modules
          rm -rf .next
          npm cache clean --force

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit || \
          (npm cache clean --force && npm ci --no-audit) || \
          (sleep 5 && npm ci --no-audit)
        timeout-minutes: 10

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Validate Dockerfile
        run: docker build -t quiz-web-ci:latest -f Dockerfile .

  trigger-deploy:
    name: Trigger CD Workflow
    needs: [build-server, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.PAT_TOKEN != ''
    steps:
      - name: Trigger CD workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.repository }}
          event-type: ci-passed
          continue-on-error: true
